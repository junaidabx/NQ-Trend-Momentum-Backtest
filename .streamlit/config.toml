[theme]
base = "dark"
primaryColor = "#4f7cff"
backgroundColor = "#0e1015"
secondaryBackgroundColor = "#171a22"
textColor = "#e6e8ee"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
# Avoid Streamlit deleting local modules from sys.modules during deploy/reload
# (prevents KeyError: 'backtest_app.*' on Streamlit Cloud).
fileWatcherType = "none"

[browser]
gatherUsageStats = false
